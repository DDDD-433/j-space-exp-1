<script>
"use strict";
const RUN = JSON.parse(document.getElementById("run-data").textContent);
const meta = RUN.metadata;
const cells = new Map();
for (const c of RUN.cells) cells.set(c.layer + ":" + c.position, c);
const positions = [...new Set(RUN.cells.map(c => c.position))].sort((a, b) => a - b);
const layers = [...new Set(RUN.cells.map(c => c.layer))].sort((a, b) => b - a);
const posInfo = new Map(RUN.positions.map(p => [p.index, p]));

document.getElementById("runmeta").textContent =
  `model ${meta.model_id} · ${meta.layers.length} layers × ${meta.n_positions} positions · ` +
  `top-${meta.top_k} · ${meta.created_at}`;
document.getElementById("disclaimer").textContent = meta.disclaimer;
document.getElementById("warnings").innerHTML =
  (meta.warnings || []).map(w => "⚠ " + escapeHtml(w)).join("<br>");

const kv = document.getElementById("metakv");
const lm = meta.lens_metadata || {};
for (const [k, v] of [["prompt", meta.prompt], ["run id", meta.run_id],
  ["device", meta.device], ["dtype", meta.dtype], ["lens", meta.lens_path],
  ["fit prompts", lm.number_of_prompts], ["residual location", lm.residual_location],
  ["patch mapping", meta.patch_mapping]]) {
  if (v === undefined || v === "") continue;
  const dt = document.createElement("dt"); dt.textContent = k;
  const dd = document.createElement("dd"); dd.textContent = String(v);
  kv.append(dt, dd);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function heat(score) {
  const s = Math.max(0, Math.min(1, score));
  return `rgba(110,168,254,${(0.06 + 0.5 * s).toFixed(3)})`;
}

const wrap = document.getElementById("gridwrap");
const table = document.createElement("table");
table.className = "grid";
const thead = document.createElement("thead");
const hrow = document.createElement("tr");
hrow.appendChild(document.createElement("th")).textContent = "layer \\\\ pos";
for (const p of positions) {
  const info = posInfo.get(p);
  const th = document.createElement("th");
  th.textContent = `${p}\u00A0${info && info.token_text ? info.token_text.trim() || "·" : ""}`;
  th.title = info ? `${info.modality} token ${info.token_id}` : "";
  hrow.appendChild(th);
}
thead.appendChild(hrow); table.appendChild(thead);
const tbody = document.createElement("tbody");
for (const layer of layers) {
  const tr = document.createElement("tr");
  const anyCell = cells.get(layer + ":" + positions[0]);
  const isOutput = anyCell && anyCell.is_model_output;
  if (isOutput) tr.className = "output-row";
  const th = document.createElement("th");
  th.textContent = isOutput ? `L${layer} (output)` : `L${layer}`;
  tr.appendChild(th);
  for (const p of positions) {
    const cell = cells.get(layer + ":" + p);
    const td = document.createElement("td");
    td.className = "cell";
    if (cell) {
      const top = cell.jlens_top[0];
      const info = posInfo.get(p);
      if (info) td.classList.add("mod-" + info.modality);
      td.textContent = top ? (top.token_display.trim() || "·") : "";
      td.style.background = top ? heat(top.normalized_score) : "transparent";
      td.addEventListener("click", () => select(layer, p, td));
      td.addEventListener("mousemove", e => showTip(e, cell, info));
      td.addEventListener("mouseleave", hideTip);
    }
    tr.appendChild(td);
  }
  tbody.appendChild(tr);
}
table.appendChild(tbody); wrap.appendChild(table);

const tip = document.getElementById("tooltip");
function showTip(e, cell, info) {
  const rows = cell.jlens_top.slice(0, 10).map((t, i) =>
    `<tr><td>${i + 1}</td><td class="tok">${escapeHtml(t.token_display)}</td>` +
    `<td>${t.score.toFixed(2)}</td></tr>`).join("");
  tip.innerHTML =
    `<b>L${cell.layer} · pos ${cell.position}</b>` +
    (info ? ` · ${info.modality} · source <span class="tok">${escapeHtml(info.token_text || "")}</span>` : "") +
    `<br>‖h‖=${cell.activation_norm.toFixed(1)} ‖Jh‖=${cell.transported_norm.toFixed(1)}` +
    `<table class="detail"><tr><th>#</th><th>top J-lens concepts</th><th>lens score</th></tr>${rows}</table>`;
  tip.style.display = "block";
  tip.style.left = Math.min(e.clientX + 14, innerWidth - 360) + "px";
  tip.style.top = Math.min(e.clientY + 14, innerHeight - 260) + "px";
}
function hideTip() { tip.style.display = "none"; }

let selectedTd = null;
function select(layer, pos, td) {
  if (selectedTd) selectedTd.classList.remove("selected");
  selectedTd = td; td.classList.add("selected");
  const cell = cells.get(layer + ":" + pos);
  const info = posInfo.get(pos);
  const mk = (entries) => entries.map((t, i) =>
    `<tr><td>${i + 1}</td><td class="tok">${escapeHtml(t.token_display)}</td>` +
    `<td>${t.token_id}</td><td>${t.score.toFixed(2)}</td>` +
    `<td>${t.normalized_score.toFixed(2)}</td></tr>`).join("");
  document.getElementById("celldetail").innerHTML =
    `<div class="mutetext">L${layer} · position ${pos}` +
    (info ? ` · ${info.modality} · source token <span class="tok">${escapeHtml(info.token_text || "")}</span>` : "") +
    (cell.is_model_output ? " · <b>model output distribution</b>" : "") + `</div>` +
    `<table class="detail"><tr><th>#</th><th>concept</th><th>id</th><th>lens score</th><th>norm.</th></tr>` +
    mk(cell.jlens_top) + `</table>`;
  const cmp = cell.comparison || {};
  document.getElementById("comparison").innerHTML =
    (cell.is_model_output
      ? `<div class="mutetext">Final layer: J-lens row equals the model output.</div>`
      : `<div class="mutetext">top-${meta.top_k} overlap ` +
        `<b>${(cmp.topk_overlap ?? 0).toFixed(2)}</b> · rank corr ` +
        `<b>${(cmp.rank_correlation ?? 0).toFixed(2)}</b></div>`) +
    `<table class="detail"><tr><th>#</th><th>logit-lens concept</th><th>score</th></tr>` +
    cell.logit_lens_top.slice(0, 10).map((t, i) =>
      `<tr><td>${i + 1}</td><td class="tok">${escapeHtml(t.token_display)}</td>` +
      `<td>${t.score.toFixed(2)}</td></tr>`).join("") + `</table>`;
}
</script>
</body>
